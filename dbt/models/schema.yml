version: 2

models:
  - name: customers_clean
    columns:
      - name: user_id
        tests:
          - not_null
          - unique
      - name: age
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 13
                max_value: 100

  - name: products_clean
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
      - name: price
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true

  - name: purchases_clean
    columns:
      - name: purchase_id
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - relationships:
              arguments:
                to: ref('customers_clean')
                field: user_id
      - name: product_id
        tests:
          - relationships:
              arguments:
                to: ref('products_clean')
                field: product_id
      - name: quantity
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                inclusive: true

  - name: sessions_clean
    columns:
      - name: session_id
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - relationships:
              arguments:
                to: ref('customers_clean')
                field: user_id

  - name: fct_sales
    columns:
      - name: purchase_id
        tests:
          - not_null

  - name: dim_customers
    columns:
      - name: user_id
        tests:
          - not_null
          - unique

  - name: dim_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique